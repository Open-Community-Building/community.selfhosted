# Toolkit configuration, resolved through spaCy's config system (confection).
# See specs/configure_projects.md. Override the root at load time the same way
# spaCy overrides training paths, e.g. point at a backup volume without code changes.

[paths]
root = "~/selfhosted/projects"

[projects]
@misc = "photo_projects.discover.v1"
root = ${paths.root}
